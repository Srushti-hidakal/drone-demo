version: '3'

services:
  drone:
    image: drone/drone:2
    ports:
      - "9090:80"
    volumes:
      - drone-data:/data
    restart: always
    environment:
      - DRONE_OPEN=true
      - DRONE_HOST=http://localhost:9090
      - DRONE_SERVER_PROTO=http
      - DRONE_SERVER_HOST=localhost:9090
      - DRONE_RPC_SECRET=supersecret

  runner:
    image: drone/drone-runner-docker:1
    restart: always
    depends_on:
      - drone
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DRONE_RPC_PROTO=http
      - DRONE_RPC_HOST=drone
      - DRONE_RPC_SECRET=supersecret
      - DRONE_RUNNER_CAPACITY=2
      - DRONE_RUNNER_NAME=my-runner

volumes:
  drone-data:
