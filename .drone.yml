kind: pipeline
type: docker
name: default

steps:
  - name: test
    image: node:18
    commands:
      - node app.js

  - name: docker-build
    image: docker:dind
    volumes:
      - name: dockersock
        path: /var/run

    commands:
      - docker build -t drone-demo .

volumes:
  - name: dockersock
    host:
      path: /var/run/docker.sock